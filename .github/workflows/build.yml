name: Build Debug APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create dummy keystore
        run: |
          keytool -genkeypair -v \
            -keystore ${{ github.workspace }}/release.jks \
            -alias tui-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password \
            -keypass password \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=US"
          echo "storeFile=release.jks" >> local.properties
          echo "storePassword=password" >> local.properties
          echo "keyAlias=tui-alias" >> local.properties
          echo "keyPassword=password" >> local.properties

      - name: Build Debug APK
        run: ./gradlew assembleFdroidDebug --no-daemon 2>&1 | tail -150

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Re-TUI-debug
          path: app/build/outputs/apk/**/**.apk